name: Python App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 nose coverage

      # ✅ ADD THIS (Lint step)
      - name: Lint with flake8
        run: |
          flake8 .

      # ✅ ADD THIS (Test step)
      - name: Run unit tests with nosetests
        run: |
          nosetests
